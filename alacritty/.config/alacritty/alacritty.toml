# Alacritty configuration file
# Font: JetBrains Mono Nerd Font

[font]
size = 12

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

# Optional: improve rendering
[font.offset]
x = 0
y = 0

[font.glyph_offset]
x = 0
y = 0
